name: smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m py_compile main.py prompt_engineering.py api_key_store.py paths.py chat_store.py scripts/smoke_check.py scripts/check_release_files.py scripts/check_frontend_startup.py
      - run: OPENAI_API_KEY=test-key python scripts/smoke_check.py
      - run: OPENAI_API_KEY=test-key python scripts/check_release_files.py
      - run: OPENAI_API_KEY=test-key python scripts/check_frontend_startup.py
